<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunde Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f5f8;
            color: #1f2937;
        }
        .container {
            max-width: 560px;
            margin: 48px auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin-top: 0;
        }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        input, button {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 16px;
        }
        input {
            flex: 1;
        }
        button {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .quick-links {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .quick-links button {
            background: #e5e7eb;
            color: #111827;
            border-color: #e5e7eb;
        }
        .quick-links button:hover {
            background: #d1d5db;
        }
        .status {
            min-height: 24px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .status.error {
            color: #b91c1c;
        }
        .status.success {
            color: #166534;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
<main class="container">
    <h1>HundeController Ajax Demo</h1>
    <p>Frage einen Hund über <code>GET /dog/{hundId}</code> ab.</p>
    <p><a href="/hund-anlegen.html">Neuen Hund anlegen</a></p>

    <div class="controls">
        <input id="hundId" type="number" min="1" value="1" placeholder="Hund-ID eingeben">
        <button id="ladenBtn" type="button">Hund laden</button>
    </div>

    <div class="quick-links">
        <button type="button" data-id="1">ID 1</button>
        <button type="button" data-id="2">ID 2</button>
        <button type="button" data-id="3">ID 3</button>
        <button type="button" data-id="99">ID 99 (Fehler)</button>
    </div>

    <div id="status" class="status"></div>
    <pre id="result">Noch keine Daten geladen.</pre>
</main>

<script>
    const idInput = document.getElementById("hundId");
    const ladenBtn = document.getElementById("ladenBtn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    async function ladeHund() {
        const hundId = idInput.value;
        if (!hundId) {
            setError("Bitte zuerst eine Hund-ID eingeben.");
            return;
        }

        setLoading("Lade Hund mit ID " + hundId + " ...");

        try {
            const response = await fetch("/dog/" + encodeURIComponent(hundId));
            const text = await response.text();
            const payload = tryParseJson(text);

            if (!response.ok) {
                const message = payload && payload.message ? payload.message : (text || "Unbekannter Fehler");
                setError("Fehler " + response.status + ": " + message);
                resultEl.textContent = text || "Keine Fehlerdetails vorhanden.";
                return;
            }

            setSuccess("Hund erfolgreich geladen.");
            resultEl.textContent = JSON.stringify(payload, null, 2);
        } catch (err) {
            setError("Netzwerkfehler: " + err.message);
            resultEl.textContent = "Request konnte nicht ausgeführt werden.";
        }
    }

    function tryParseJson(text) {
        try {
            return JSON.parse(text);
        } catch (_) {
            return null;
        }
    }

    function setLoading(msg) {
        statusEl.className = "status";
        statusEl.textContent = msg;
    }

    function setError(msg) {
        statusEl.className = "status error";
        statusEl.textContent = msg;
    }

    function setSuccess(msg) {
        statusEl.className = "status success";
        statusEl.textContent = msg;
    }

    ladenBtn.addEventListener("click", ladeHund);

    document.querySelectorAll(".quick-links button").forEach((button) => {
        button.addEventListener("click", () => {
            idInput.value = button.dataset.id;
            ladeHund();
        });
    });
</script>
</body>
</html>
