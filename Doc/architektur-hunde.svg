<svg xmlns="http://www.w3.org/2000/svg" width="920" height="580" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Backgrounds -->
  <rect x="0" y="0" width="920" height="580" fill="#f8fafc"/>
  <rect x="0" y="0" width="385" height="580" fill="#eff6ff"/>
  <rect x="385" y="0" width="535" height="580" fill="#f0fdf4"/>

  <!-- Divider -->
  <line x1="385" y1="0" x2="385" y2="580" stroke="#93c5fd" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- REST API vertical label -->
  <text transform="translate(385,310) rotate(-90)" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="bold" letter-spacing="3" opacity="0.7">REST API</text>

  <!-- ===== HEADERS ===== -->
  <rect x="14" y="12" width="357" height="46" fill="#1d4ed8" rx="9"/>
  <text x="192" y="44" text-anchor="middle" fill="white" font-size="22" font-weight="bold" letter-spacing="3">CLIENT</text>

  <rect x="400" y="12" width="506" height="46" fill="#15803d" rx="9"/>
  <text x="653" y="44" text-anchor="middle" fill="white" font-size="22" font-weight="bold" letter-spacing="3">SERVER</text>

  <!-- ===== CLIENT: hunde.html ===== -->
  <rect x="18" y="78" width="338" height="128" fill="white" stroke="#0284c7" stroke-width="2" rx="10"/>
  <rect x="18" y="78" width="338" height="34" fill="#0ea5e9" rx="10"/>
  <rect x="18" y="98" width="338" height="14" fill="#0ea5e9"/>
  <text x="187" y="101" text-anchor="middle" fill="white" font-size="14" font-weight="bold">hunde.html</text>
  <text x="35" y="130" fill="#374151" font-size="12">Eingabefeld: Hund-ID</text>
  <text x="35" y="150" fill="#374151" font-size="12">Button: "Hund laden"</text>
  <text x="35" y="170" fill="#374151" font-size="12">JavaScript: fetch()</text>
  <text x="35" y="190" fill="#1d4ed8" font-size="13" font-weight="bold">GET /dog/{hundId}</text>

  <!-- ===== CLIENT: hund-anlegen.html ===== -->
  <rect x="18" y="232" width="338" height="162" fill="white" stroke="#0284c7" stroke-width="2" rx="10"/>
  <rect x="18" y="232" width="338" height="34" fill="#0ea5e9" rx="10"/>
  <rect x="18" y="252" width="338" height="14" fill="#0ea5e9"/>
  <text x="187" y="255" text-anchor="middle" fill="white" font-size="14" font-weight="bold">hund-anlegen.html</text>
  <text x="35" y="285" fill="#374151" font-size="12">Formular: ID, Name, Alter</text>
  <text x="35" y="305" fill="#374151" font-size="12">JavaScript: Formular  JSON-Objekt</text>
  <text x="35" y="325" fill="#6b7280" font-size="11">{ id: number, name: string, age: number }</text>
  <text x="35" y="348" fill="#374151" font-size="12">fetch() mit Content-Type: application/json</text>
  <text x="35" y="368" fill="#1d4ed8" font-size="13" font-weight="bold">POST /dog/create</text>

  <!-- JavaScript label -->
  <text x="192" y="440" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="bold">JavaScript (fetch API)</text>
  <text x="192" y="460" text-anchor="middle" fill="#374151" font-size="11">baut JSON-Payload aus Formulardaten</text>

  <!-- Big "Client" watermark -->
  <text x="192" y="530" text-anchor="middle" fill="#1d4ed8" font-size="36" font-weight="bold" opacity="0.12">Client</text>

  <!-- ===== SERVER: HundeController ===== -->
  <rect x="403" y="78" width="215" height="118" fill="white" stroke="#2563eb" stroke-width="2" rx="10"/>
  <rect x="403" y="78" width="215" height="34" fill="#3b82f6" rx="10"/>
  <rect x="403" y="98" width="215" height="14" fill="#3b82f6"/>
  <text x="510" y="101" text-anchor="middle" fill="white" font-size="12" font-weight="bold">HundeController</text>
  <text x="510" y="129" text-anchor="middle" fill="#374151" font-size="11">@RestController</text>
  <text x="510" y="147" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="bold">GET /dog/{hundId}</text>
  <text x="510" y="165" text-anchor="middle" fill="#374151" font-size="11">hundeService.getHundById()</text>
  <text x="510" y="184" text-anchor="middle" fill="#6b7280" font-size="10">200 OK | 404 Not Found</text>

  <!-- ===== SERVER: HundAnlegenController ===== -->
  <rect x="403" y="224" width="215" height="158" fill="white" stroke="#2563eb" stroke-width="2" rx="10"/>
  <rect x="403" y="224" width="215" height="34" fill="#3b82f6" rx="10"/>
  <rect x="403" y="244" width="215" height="14" fill="#3b82f6"/>
  <text x="510" y="247" text-anchor="middle" fill="white" font-size="11" font-weight="bold">HundAnlegenController</text>
  <text x="510" y="275" text-anchor="middle" fill="#374151" font-size="11">@RestController</text>
  <text x="510" y="293" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="bold">POST /dog/create</text>
  <text x="510" y="311" text-anchor="middle" fill="#374151" font-size="11">validateRequest()</text>
  <text x="510" y="329" text-anchor="middle" fill="#374151" font-size="11">hundeService.addHund()</text>
  <text x="510" y="347" text-anchor="middle" fill="#6b7280" font-size="10">201 Created | 400 Bad Request</text>
  <text x="510" y="365" text-anchor="middle" fill="#6b7280" font-size="10">409 Conflict</text>

  <!-- ===== SERVER: HundeService ===== -->
  <rect x="645" y="120" width="218" height="148" fill="white" stroke="#15803d" stroke-width="2" rx="10"/>
  <rect x="645" y="120" width="218" height="34" fill="#16a34a" rx="10"/>
  <rect x="645" y="140" width="218" height="14" fill="#16a34a"/>
  <text x="754" y="143" text-anchor="middle" fill="white" font-size="13" font-weight="bold">HundeService</text>
  <text x="754" y="171" text-anchor="middle" fill="#374151" font-size="11">@Service</text>
  <text x="754" y="191" text-anchor="middle" fill="#374151" font-size="12" font-weight="bold">getHundById(int hundId)</text>
  <text x="754" y="209" text-anchor="middle" fill="#6b7280" font-size="10">Hund | null</text>
  <text x="754" y="231" text-anchor="middle" fill="#374151" font-size="12" font-weight="bold">addHund(id, name, age)</text>
  <text x="754" y="249" text-anchor="middle" fill="#6b7280" font-size="10">Hund | IllegalArgumentException</text>

  <!-- ===== SERVER: Hashtable ===== -->
  <rect x="645" y="296" width="218" height="72" fill="white" stroke="#d97706" stroke-width="2" rx="10"/>
  <rect x="645" y="296" width="218" height="34" fill="#f59e0b" rx="10"/>
  <rect x="645" y="316" width="218" height="14" fill="#f59e0b"/>
  <text x="754" y="319" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Hashtable&lt;Integer, Hund&gt;</text>
  <text x="754" y="352" text-anchor="middle" fill="#374151" font-size="10">Fifi (1), Bello (2), Luna (3)</text>

  <!-- ===== SERVER: Hund ===== -->
  <rect x="645" y="396" width="218" height="108" fill="white" stroke="#7c3aed" stroke-width="2" rx="10"/>
  <rect x="645" y="396" width="218" height="34" fill="#7c3aed" rx="10"/>
  <rect x="645" y="416" width="218" height="14" fill="#7c3aed"/>
  <text x="754" y="419" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Hund</text>
  <text x="754" y="447" text-anchor="middle" fill="#374151" font-size="12">id : int</text>
  <text x="754" y="467" text-anchor="middle" fill="#374151" font-size="12">name : String</text>
  <text x="754" y="487" text-anchor="middle" fill="#374151" font-size="12">age : int</text>

  <!-- ===== ARROWS ===== -->

  <!-- hunde.html -> HundeController -->
  <path d="M 356 142 L 403 137" stroke="#1d4ed8" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- hund-anlegen.html -> HundAnlegenController -->
  <path d="M 356 313 L 403 303" stroke="#1d4ed8" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- HundeController -> HundeService -->
  <path d="M 618 155 Q 630 155 645 180" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>

  <!-- HundAnlegenController -> HundeService -->
  <path d="M 618 280 Q 630 265 645 225" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>

  <!-- HundeService -> Hashtable -->
  <path d="M 754 268 L 754 296" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>

  <!-- Hashtable -> Hund -->
  <path d="M 754 368 L 754 396" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>

  <!-- Big "Server" watermark -->
  <text x="653" y="530" text-anchor="middle" fill="#15803d" font-size="36" font-weight="bold" opacity="0.12">Server</text>
</svg>
