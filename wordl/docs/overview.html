<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordl — Projektübersicht</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #273548;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --green: #4ade80;
      --green-bg: #052e16;
      --green-border: #166534;
      --blue: #60a5fa;
      --blue-bg: #1e3a5f;
      --blue-border: #1d4ed8;
      --orange: #fb923c;
      --orange-bg: #431407;
      --orange-border: #c2410c;
      --yellow: #fbbf24;
      --yellow-bg: #451a03;
      --yellow-border: #b45309;
      --purple: #a78bfa;
      --red: #f87171;
      --correct: #538d4e;
      --present: #b59f3b;
      --absent: #3a3a3c;
      --font-mono: 'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--green);
    }

    header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 1.05rem;
    }

    section {
      margin-bottom: 4rem;
    }

    section > h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      border-left: 4px solid var(--blue);
      padding-left: 0.75rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>WORDL</h1>
      <p>Projektübersicht — Frontend &amp; Backend Architektur</p>
    </header>

    <section id="architecture">
      <h2>1. Systemarchitektur</h2>
      <!-- Task 2 -->
    </section>

    <section id="flow">
      <h2>2. Ein Spielzug — Schritt für Schritt</h2>
      <!-- Task 3 + 4 -->
    </section>
  </div>
</body>
</html>
